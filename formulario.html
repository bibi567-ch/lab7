<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulario de Registro - Laboratorio 7">
    <meta name="keywords" content="HTML5, CSS3, Formulario, Registro, WEB">
    <title>Laboratorio 7 - Formulario de Registro</title>
    <link rel="stylesheet" href="formulario.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-user-plus"></i> Formulario de Registro</h1>
            <button id="themeToggle" class="theme-toggle-btn">
                <i class="fas fa-moon"></i> Modo Oscuro
            </button>
            <p>Completa todos los campos para crear tu cuenta</p>       
        </header>
        
        <main>
            <div class="form-container">
                <div class="form-header">
                    <h2><i class="fas fa-id-card"></i> Información Personal</h2>
                </div>
                
                <form id="registrationForm" novalidate>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nombre">Nombre:</label>
                            <input type="text" id="nombre" name="nombre" required>
                            <div class="error-message" id="nombreError"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="apellido">Apellido:</label>
                            <input type="text" id="apellido" name="apellido" required>
                            <div class="error-message" id="apellidoError"></div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Correo Electrónico:</label>
                        <input type="email" id="email" name="email" required>
                        <div class="error-message" id="emailError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña:</label>
                        <div class="password-container">
                            <input type="password" id="password" name="password" required>
                            <span class="toggle-password" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="passwordStrengthBar"></div>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Contraseña:</label>
                        <div class="password-container">
                            <input type="password" id="confirmPassword" name="confirmPassword" required>
                            <span class="toggle-password" id="toggleConfirmPassword">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                        <div class="error-message" id="confirmPasswordError"></div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="edad">Edad:</label>
                            <input type="number" id="edad" name="edad" min="0" max="120" required>
                            <div class="error-message" id="edadError"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="fecha">Fecha de Nacimiento:</label>
                            <input type="date" id="fecha" name="fecha" required>
                            <div class="error-message" id="fechaError"></div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="genero">Género:</label>
                        <select id="genero" name="genero" required>
                            <option value="">Seleccione...</option>
                            <option value="masculino">Masculino</option>
                            <option value="femenino">Femenino</option>
                            <option value="otro">Otro</option>
                        </select>
                        <div class="error-message" id="generoError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="hora_de_cita">Hora de cita:</label>
                        <input type="time" id="hora_de_cita" name="hora_de_cita" required>
                        <div class="error-message" id="horaDeCitaError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="color_favorito">Color favorito:</label>
                        <input type="color" id="color_favorito" name="color_favorito" required>
                        <div class="error-message" id="colorFavoritoError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="sitio_web">Sitio web:</label>
                        <input type="url" id="sitio_web" name="sitio_web" placeholder="https://ejemplo.com" required>
                        <div class="error-message" id="sitioWebError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="numero_telefono">Número de teléfono:</label>
                        <input type="tel" id="numero_telefono" name="numero_telefono" 
                               pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" 
                               placeholder="123-456-7890" required>
                        <div class="error-message" id="numeroTelefonoError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="archivo">Subir archivo:</label>
                        <input type="file" id="archivo" name="archivo">
                        <div class="error-message" id="archivoError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="mensaje">Mensaje:</label>
                        <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
                        <div class="error-message" id="mensajeError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="carrera">Carrera:</label>
                        <select id="carrera" name="carrera" required>
                            <option value="">Seleccione...</option>
                            <option value="sistemas">Ingeniería de Sistemas</option>
                            <option value="civil">Ingeniería Civil</option>
                            <option value="industrial">Ingeniería Industrial</option>
                        </select>
                        <div class="error-message" id="carreraError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Intereses:</label><br>
                        <div class="checkbox-group">
                            <input type="checkbox" id="deportes" name="intereses" value="deportes">
                            <label for="deportes">Deportes</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="musica" name="intereses" value="musica">
                            <label for="musica">Música</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="tecnologia" name="intereses" value="tecnologia">
                            <label for="tecnologia">Tecnología</label>
                        </div>
                        <div class="error-message" id="interesesError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="pais">País:</label>
                        <select id="pais" name="pais" required>
                            <option value="">Seleccione...</option>
                            <option value="bolivia">Bolivia</option>
                            <option value="argentina">Argentina</option>
                            <option value="chile">Chile</option>
                            <option value="peru">Perú</option>
                            <option value="brasil">Brasil</option>
                        </select>
                        <div class="error-message" id="paisError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="comentarios">Comentarios:</label>
                        <textarea id="comentarios" name="comentarios" rows="4" cols="40"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <input type="checkbox" id="terminos" name="terminos" required>
                        <label for="terminos">Acepto los <a href="#" style="color: var(--primary-color);">Términos y Condiciones</a></label>
                        <div class="error-message" id="terminosError"></div>
                    </div>
                    
                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary">Enviar</button>
                        <input type="reset" class="btn btn-secondary" value="Borrar">
                    </div>
                </form>
            </div>
        </main>
        
        <footer>
            <div class="footer-content">
                <p><i class="fas fa-info-circle"></i> Este sistema de formulario es parte del Laboratorio 7 de Programación con html y css.</p>
                <p>© 2025 Universidad Adventista de Bolivia - Facultad de Ingeniería</p>
            </div>
        </footer>
    </div>

    <script>
        function setupPasswordToggle(toggleId, inputId) {
            const toggle = document.getElementById(toggleId);
            const input = document.getElementById(inputId);
            
            toggle.addEventListener('click', () => {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                toggle.querySelector('i').classList.toggle('fa-eye');
                toggle.querySelector('i').classList.toggle('fa-eye-slash');
            });
        }
        
        setupPasswordToggle('togglePassword', 'password');
        setupPasswordToggle('toggleConfirmPassword', 'confirmPassword');
        function validatePassword(password) {
            const minLength = 8;
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasNumbers = /\d/.test(password);
            const hasSpecialChar = /[!@#$%^&*(),.?":{}|<>]/.test(password);
            
            return password.length >= minLength && 
                   hasUpperCase && 
                   hasLowerCase && 
                   hasNumbers && 
                   hasSpecialChar;
        }
        function calculatePasswordStrength(password) {
            let strength = 0;
            
            if (password.length > 0) strength += 1;
            if (password.length >= 6) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[^A-Za-z0-9]/.test(password)) strength += 1;
            
            return Math.min(strength * 20, 100);
        }
        const passwordInput = document.getElementById('password');
        const passwordStrengthBar = document.getElementById('passwordStrengthBar');
        
        passwordInput.addEventListener('input', () => {
            const strength = calculatePasswordStrength(passwordInput.value);
            passwordStrengthBar.style.width = `${strength}%`;
            
            if (strength < 40) {
                passwordStrengthBar.style.background = '#f72585';
            } else if (strength < 70) {
                passwordStrengthBar.style.background = '#ff9e00';
            } else {
                passwordStrengthBar.style.background = '#4cc9f0';
            }
        });

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        document.getElementById('email').addEventListener('blur', function() {
            const email = this.value;
            const errorDiv = document.getElementById('emailError');
            
            if (!email) {
                errorDiv.textContent = 'El correo electrónico es requerido';
                errorDiv.style.display = 'block';
            } else if (!validateEmail(email)) {
                errorDiv.textContent = 'Por favor ingrese un correo electrónico válido';
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        });
        
        document.getElementById('password').addEventListener('blur', function() {
            const password = this.value;
            const errorDiv = document.getElementById('passwordError');
            
            if (!password) {
                errorDiv.textContent = 'La contraseña es requerida';
                errorDiv.style.display = 'block';
            } else if (!validatePassword(password)) {
                errorDiv.textContent = 'La contraseña debe tener al menos 8 caracteres, una mayúscula, un número y un símbolo';
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        });
        
        document.getElementById('confirmPassword').addEventListener('blur', function() {
            const confirmPassword = this.value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('confirmPasswordError');
            
            if (!confirmPassword) {
                errorDiv.textContent = 'Debe confirmar su contraseña';
                errorDiv.style.display = 'block';
            } else if (confirmPassword !== password) {
                errorDiv.textContent = 'Las contraseñas no coinciden';
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        });

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let isValid = true;

            const nombre = document.getElementById('nombre').value;
            const nombreError = document.getElementById('nombreError');
            if (!nombre) {
                nombreError.textContent = 'El nombre es requerido';
                nombreError.style.display = 'block';
                isValid = false;
            } else {
                nombreError.style.display = 'none';
            }

            const apellido = document.getElementById('apellido').value;
            const apellidoError = document.getElementById('apellidoError');
            if (!apellido) {
                apellidoError.textContent = 'El apellido es requerido';
                apellidoError.style.display = 'block';
                isValid = false;
            } else {
                apellidoError.style.display = 'none';
            }

            const email = document.getElementById('email').value;
            const emailError = document.getElementById('emailError');
            if (!email) {
                emailError.textContent = 'El correo electrónico es requerido';
                emailError.style.display = 'block';
                isValid = false;
            } else if (!validateEmail(email)) {
                emailError.textContent = 'Por favor ingrese un correo electrónico válido';
                emailError.style.display = 'block';
                isValid = false;
            } else {
                emailError.style.display = 'none';
            }

            const password = document.getElementById('password').value;
            const passwordError = document.getElementById('passwordError');
            if (!password) {
                passwordError.textContent = 'La contraseña es requerida';
                passwordError.style.display = 'block';
                isValid = false;
            } else if (!validatePassword(password)) {
                passwordError.textContent = 'La contraseña debe tener al menos 8 caracteres, una mayúscula, un número y un símbolo';
                passwordError.style.display = 'block';
                isValid = false;
            } else {
                passwordError.style.display = 'none';
            }

            const confirmPassword = document.getElementById('confirmPassword').value;
            const confirmPasswordError = document.getElementById('confirmPasswordError');
            if (!confirmPassword) {
                confirmPasswordError.textContent = 'Debe confirmar su contraseña';
                confirmPasswordError.style.display = 'block';
                isValid = false;
            } else if (confirmPassword !== password) {
                confirmPasswordError.textContent = 'Las contraseñas no coinciden';
                confirmPasswordError.style.display = 'block';
                isValid = false;
            } else {
                confirmPasswordError.style.display = 'none';
            }

            const edad = document.getElementById('edad').value;
            const edadError = document.getElementById('edadError');
            if (!edad) {
                edadError.textContent = 'La edad es requerida';
                edadError.style.display = 'block';
                isValid = false;
            } else if (edad < 0 || edad > 120) {
                edadError.textContent = 'La edad debe estar entre 0 y 120';
                edadError.style.display = 'block';
                isValid = false;
            } else {
                edadError.style.display = 'none';
            }

            const fecha = document.getElementById('fecha').value;
            const fechaError = document.getElementById('fechaError');
            if (!fecha) {
                fechaError.textContent = 'La fecha de nacimiento es requerida';
                fechaError.style.display = 'block';
                isValid = false;
            } else {
                fechaError.style.display = 'none';
            }

            const genero = document.getElementById('genero').value;
            const generoError = document.getElementById('generoError');
            if (!genero) {
                generoError.textContent = 'Debe seleccionar un género';
                generoError.style.display = 'block';
                isValid = false;
            } else {
                generoError.style.display = 'none';
            }

            const horaDeCita = document.getElementById('hora_de_cita').value;
            const horaDeCitaError = document.getElementById('horaDeCitaError');
            if (!horaDeCita) {
                horaDeCitaError.textContent = 'La hora de cita es requerida';
                horaDeCitaError.style.display = 'block';
                isValid = false;
            } else {
                horaDeCitaError.style.display = 'none';
            }

            const colorFavorito = document.getElementById('color_favorito').value;
            const colorFavoritoError = document.getElementById('colorFavoritoError');
            if (!colorFavorito) {
                colorFavoritoError.textContent = 'Debe seleccionar un color favorito';
                colorFavoritoError.style.display = 'block';
                isValid = false;
            } else {
                colorFavoritoError.style.display = 'none';
            }

            const sitioWeb = document.getElementById('sitio_web').value;
            const sitioWebError = document.getElementById('sitioWebError');
            if (!sitioWeb) {
                sitioWebError.textContent = 'El sitio web es requerido';
                sitioWebError.style.display = 'block';
                isValid = false;
            } else {
                sitioWebError.style.display = 'none';
            }

            const numeroTelefono = document.getElementById('numero_telefono').value;
            const numeroTelefonoError = document.getElementById('numeroTelefonoError');
            if (!numeroTelefono) {
                numeroTelefonoError.textContent = 'El número de teléfono es requerido';
                numeroTelefonoError.style.display = 'block';
                isValid = false;
            } else if (!/^[0-9]{3}-[0-9]{3}-[0-9]{4}$/.test(numeroTelefono)) {
                numeroTelefonoError.textContent = 'El número de teléfono debe tener el formato 123-456-7890';
                numeroTelefonoError.style.display = 'block';
                isValid = false;
            } else {
                numeroTelefonoError.style.display = 'none';
            }

            const carrera = document.getElementById('carrera').value;
            const carreraError = document.getElementById('carreraError');
            if (!carrera) {
                carreraError.textContent = 'Debe seleccionar una carrera';
                carreraError.style.display = 'block';
                isValid = false;
            } else {
                carreraError.style.display = 'none';
            }

            const pais = document.getElementById('pais').value;
            const paisError = document.getElementById('paisError');
            if (!pais) {
                paisError.textContent = 'Debe seleccionar un país';
                paisError.style.display = 'block';
                isValid = false;
            } else {
                paisError.style.display = 'none';
            }

            const terminos = document.getElementById('terminos').checked;
            const terminosError = document.getElementById('terminosError');
            if (!terminos) {
                terminosError.textContent = 'Debe aceptar los términos y condiciones';
                terminosError.style.display = 'block';
                isValid = false;
            } else {
                terminosError.style.display = 'none';
            }
            
            if (isValid) {

                alert('¡Formulario enviado correctamente!');

                this.reset();
            }
        });
    </script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const themeToggle = document.getElementById('themeToggle');
        if (!themeToggle) return;

        const isDark = localStorage.getItem('darkMode') === 'true';
        if (isDark) {
            document.body.classList.add('dark-mode');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i> Modo Claro';
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isNowDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isNowDark);
            themeToggle.innerHTML = isNowDark 
                ? '<i class="fas fa-sun"></i> Modo Claro'
                : '<i class="fas fa-moon"></i> Modo Oscuro';
        });
    });
</script>
</body>
</html>
