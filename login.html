<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login - Laboratorio 7">
    <meta name="keywords" content="HTML5, CSS3, Login, UAB">
    <title>Login - UAB</title>
    <link rel="stylesheet" href="login-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Iniciar Sesión</h1>
            <button id="themeToggle" class="theme-toggle-btn">
              <i class="fas fa-moon"></i> Modo Oscuro
            </button>
            <p>Accede a tu cuenta para continuar</p>
        </header>
        <main>
            <div class="login-container">
                <div class="login-header">
                    <h2><i class="fas fa-sign-in-alt"></i> Iniciar Sesión</h2>
                </div>
                
                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="usuario">Usuario o Email:</label>
                        <input type="text" id="usuario" name="usuario" required>
                        <div class="error-message" id="usuarioError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña:</label>
                        <div class="password-container">
                            <input type="password" id="password" name="password" required>
                            <span class="toggle-password" id="toggleLoginPassword">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>
                    
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Recordar mi usuario</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </form>
                
                <div class="switch-form">
                    <p>¿No tienes cuenta? <a href="#" id="showRegister">Regístrate aquí</a></p>
                </div>
                
                <div class="forgot-password">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>
            </div>
        </main>
        
        <footer>
            <p><i class="fas fa-info-circle"></i> Este sistema de login es parte del Laboratorio 7 de Taller de Programación con html y css.</p>
            <p>© 2025 Universidad Adventista de Bolivia. Todos los derechos reservados.</p>
        </footer>
    </div>

    <script>
        function setupPasswordToggle(toggleId, inputId) {
            const toggle = document.getElementById(toggleId);
            const input = document.getElementById(inputId);
            
            toggle.addEventListener('click', () => {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                toggle.querySelector('i').classList.toggle('fa-eye');
                toggle.querySelector('i').classList.toggle('fa-eye-slash');
            });
        }
        
        setupPasswordToggle('toggleLoginPassword', 'password');
        document.getElementById('usuario').addEventListener('blur', function() {
            const usuario = this.value;
            const errorDiv = document.getElementById('usuarioError');
            
            if (!usuario) {
                errorDiv.textContent = 'El usuario o email es requerido';
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        });
        
        document.getElementById('password').addEventListener('blur', function() {
            const password = this.value;
            const errorDiv = document.getElementById('passwordError');
            
            if (!password) {
                errorDiv.textContent = 'La contraseña es requerida';
                errorDiv.style.display = 'block';
            } else if (password.length < 6) {
                errorDiv.textContent = 'La contraseña debe tener al menos 6 caracteres';
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        });
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let isValid = true;
            const usuario = document.getElementById('usuario').value;
            const usuarioError = document.getElementById('usuarioError');
            if (!usuario) {
                usuarioError.textContent = 'El usuario o email es requerido';
                usuarioError.style.display = 'block';
                isValid = false;
            } else {
                usuarioError.style.display = 'none';
            }
            
            const password = document.getElementById('password').value;
            const passwordError = document.getElementById('passwordError');
            if (!password) {
                passwordError.textContent = 'La contraseña es requerida';
                passwordError.style.display = 'block';
                isValid = false;
            } else if (password.length < 6) {
                passwordError.textContent = 'La contraseña debe tener al menos 6 caracteres';
                passwordError.style.display = 'block';
                isValid = false;
            } else {
                passwordError.style.display = 'none';
            }
            
            if (isValid) {
                alert('¡Inicio de sesión exitoso!');
                this.reset();
            }
        });
    </script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const themeToggle = document.getElementById('themeToggle');
        if (!themeToggle) return;

        const isDark = localStorage.getItem('darkMode') === 'true';
        if (isDark) {
            document.body.classList.add('dark-mode');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i> Modo Claro';
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isNowDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isNowDark);
            themeToggle.innerHTML = isNowDark 
                ? '<i class="fas fa-sun"></i> Modo Claro'
                : '<i class="fas fa-moon"></i> Modo Oscuro';
        });
    });
   </script>
</body>
</html>
